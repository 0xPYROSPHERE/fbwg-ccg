<!DOCTYPE html>
<html lang=en>

<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex,nofollow">
    <title>Fireboy And Watergirl Light Temple</title>
    <base href="https://cdn.jsdelivr.net/gh/0xPYROSPHERE/fbwg-ccg@main/light/">

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }

        #inner {
            margin: 0 auto;
            width: 133vh;
            height: 100vh;
            position: relative;
            box-shadow: 0 0 5vmin 1vmin black;
        }

    </style>

</head>

<body>
    
    <div id="inner"></div>
    
    <script src="fireboyandwatergirlight.js"></script>

    <script>
        var intervalID = setInterval(function() {
            if (document.getElementById('stage0') !== null) {
                document.getElementById('stage0').firstChild.style.backgroundColor = "rgb(0, 0, 0)";
                var node = document.getElementById("stage0");
                if (node.parentNode) node.parentNode.removeChild(node);
                document.getElementById('inner').appendChild(node);
                clearInterval(intervalID);
            }
        }, 500);

        const doResize = true;
        const focusWindow = true;
		const timedReloadEnabled = false;
		const auxSetting = false;
        
        function resizeGameCanvas() {
            const canvas = document.querySelector("canvas");

            if (canvas) {
                canvas.style.maxWidth = "100vw";
                canvas.style.maxHeight = "100vh";
            }
        }

        if (doResize) {
            const canvasInterval = setInterval(resizeGameCanvas, 1500);
        }

        if (focusWindow) {
            window.addEventListener('blur', () => {
                window.focus();
            });
        }
    </script>

</body>

</html>
